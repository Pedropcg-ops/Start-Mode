<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#101010" />
    <title>START MODE</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell" aria-live="polite">
      <section class="screen intro-screen is-active" id="introScreen" data-screen="intro">
        <div class="intro-mark" aria-hidden="true">
          <span></span>
        </div>
        <p class="overline">START MODE</p>
        <h1>Activa tu modo inicio.</h1>
      </section>

      <section class="screen menu-screen" id="menuScreen" data-screen="menu">
        <div class="screen-top">
          <p class="overline">START MODE</p>
          <h2>¿Qué vas a hacer ahora?</h2>
          <p class="last-session" id="menuLastSession"></p>
        </div>

        <div class="mode-grid" aria-label="Selecciona un modo">
          <button class="mode-card" type="button" data-mode="Trabajo">
            <span class="mode-name">Trabajo</span>
            <span class="mode-desc">Prioridad clara</span>
          </button>
          <button class="mode-card" type="button" data-mode="Estudio">
            <span class="mode-name">Estudio</span>
            <span class="mode-desc">Atención sostenida</span>
          </button>
          <button class="mode-card" type="button" data-mode="Crear">
            <span class="mode-name">Crear</span>
            <span class="mode-desc">Idea en marcha</span>
          </button>
          <button class="mode-card" type="button" data-mode="Organizar">
            <span class="mode-name">Organizar</span>
            <span class="mode-desc">Orden rápido</span>
          </button>
          <button class="mode-card mode-card-wide" type="button" data-mode="Café">
            <span class="mode-name">Café</span>
            <span class="mode-desc">Pausa antes de empezar</span>
          </button>
        </div>
      </section>

      <section class="screen duration-screen" id="durationScreen" data-screen="duration">
        <div class="screen-top">
          <button class="ghost-button back-button" type="button" id="backToMenuFromDuration">Volver</button>
          <p class="overline" id="selectedModeLabel">Modo</p>
          <h2>¿Cuánto tiempo quieres dedicarle?</h2>
          <p class="last-session" id="durationLastSession"></p>
        </div>

        <div class="duration-grid" aria-label="Selecciona duración">
          <button class="duration-button" type="button" data-minutes="15">15 min</button>
          <button class="duration-button" type="button" data-minutes="25">25 min</button>
          <button class="duration-button" type="button" data-minutes="45">45 min</button>
          <button class="duration-button" type="button" data-minutes="90">90 min</button>
          <button class="duration-button custom-toggle" type="button" id="customToggle">Personalizado</button>
        </div>

        <div class="custom-duration" id="customDuration" hidden>
          <button class="step-button" type="button" id="minusMinutes" aria-label="Reducir minutos">-</button>
          <label class="custom-input-wrap">
            <span>Minutos</span>
            <input id="customMinutes" type="number" min="1" max="180" value="25" inputmode="numeric" />
          </label>
          <button class="step-button" type="button" id="plusMinutes" aria-label="Aumentar minutos">+</button>
          <button class="primary-button custom-start" type="button" id="startCustom">Iniciar</button>
        </div>
      </section>

      <section class="screen timer-screen" id="timerScreen" data-screen="timer">
        <div class="timer-panel">
          <p class="overline" id="timerModeLabel">Modo</p>
          <div class="timer-ring" aria-hidden="true">
            <span></span>
          </div>
          <p class="timer-display" id="timerDisplay">25:00</p>
          <p class="motivation" id="motivationText">Una sesión. Una intención.</p>
        </div>

        <div class="action-row">
          <button class="secondary-button" type="button" id="pauseResume">Pausar</button>
          <button class="ghost-button" type="button" id="finishSession">Terminar</button>
        </div>
      </section>

      <section class="screen coffee-screen" id="coffeeScreen" data-screen="coffee">
        <div class="coffee-content">
          <p class="overline">PAUSA</p>
          <h2 id="coffeeTitle">Disfruta.</h2>
          <p id="coffeeSubtitle">Tómate este momento antes de empezar.</p>
          <p class="coffee-timer" id="coffeeTimer">5:00</p>
        </div>
        <button class="primary-button bottom-button" type="button" id="coffeeDone">Vamos con ello</button>
      </section>

      <section class="screen complete-screen" id="completeScreen" data-screen="complete">
        <div class="complete-content">
          <p class="overline">START MODE</p>
          <h2>Sesión completada.</h2>
          <p>Has cumplido con tu intención.</p>
        </div>
        <div class="action-row">
          <button class="primary-button" type="button" id="newSession">Nueva sesión</button>
          <button class="ghost-button" type="button" id="homeFromComplete">Volver al inicio</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
